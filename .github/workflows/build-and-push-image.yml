name: Build and Push Docker Image

on:
  push:
    branches:
      - DEV

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- SOLUTION 4: Direct secret mounting ---
      # Pass the base64-encoded secret directly to Docker
      # Docker will handle the decoding internally
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dev
          secrets: |
            maven-settings=${{ secrets.MAVEN_SETTINGS }}
          push: true
          tags: ghcr.io/table2table-org/auth-service:${{ github.sha }}
