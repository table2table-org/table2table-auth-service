name: Build and Push Docker Image

on:
  push:
    branches:
      - DEV

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- THIS IS THE FIX ---
      # Step 1: Decode the MAVEN_SETTINGS secret from Base64 into a temporary file.
      - name: Decode Maven Settings
        run: echo "${{ secrets.MAVEN_SETTINGS }}" | base64 --decode > ${{ runner.temp }}/settings.xml

      # Step 2: Build the image, pointing the secret to the temporary file.
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dev
          # This now securely points to the decoded settings.xml file.
          secrets: maven-settings=${{ runner.temp }}/settings.xml
          push: true
          tags: ghcr.io/table2table-org/auth-service:${{ github.sha }}