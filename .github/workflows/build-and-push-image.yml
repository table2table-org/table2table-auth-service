name: Build and Push Docker Image

on:
  push:
    branches:
      - DEV

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Grant permissions for the workflow to read the repo and write packages
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dev
          # Pass the settings.xml as a build secret
          secrets: maven-settings=${{ secrets.MAVEN_SETTINGS }}
          push: true
          # Create a unique, traceable tag for the image based on the commit SHA
          tags: ghcr.io/table2table-org/auth-service:${{ github.sha }}